name: Capture GitHub App token format

on:
  workflow_dispatch:
    inputs:
      override:
        description: Token format override to request
        required: true
        default: enabled
        type: choice
        options:
          - enabled
          - disabled
          - both
          - absent
      comment_issue_number:
        description: Optional issue number to comment on
        required: false
        type: string
  schedule:
    - cron: "*/15 * * * *"
  issues:
    types:
      - opened

permissions:
  contents: read
  issues: write

jobs:
  capture:
    runs-on: ubuntu-latest
    env:
      GITHUB_APP_ID: ${{ secrets.GHAPPJWT_APP_ID }}
      GITHUB_INSTALLATION_ID: ${{ secrets.GHAPPJWT_INSTALLATION_ID }}
      GHAPPJWT_PRIVATE_KEY_PEM: ${{ secrets.GHAPPJWT_PRIVATE_KEY }}
      OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.override || 'both' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Write private key
        shell: bash
        run: |
          key_path="${RUNNER_TEMP}/github-app.private-key.pem"
          printf '%s' "${GHAPPJWT_PRIVATE_KEY_PEM}" > "${key_path}"
          chmod 600 "${key_path}"
          echo "GITHUB_APP_PRIVATE_KEY=${key_path}" >> "${GITHUB_ENV}"

      - name: Capture token format
        run: |
          python ghappjwt.py \
            --override "${OVERRIDE}" \
            --output capture-output.json

      - name: Render Markdown report
        run: |
          python scripts/render_issue_comment.py capture-output.json > capture-report.md
          cat capture-report.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload sanitized capture
        uses: actions/upload-artifact@v4
        with:
          name: ghappjwt-capture
          path: |
            capture-output.json
            capture-report.md
          retention-days: 14

      - name: Comment on opened issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --body-file capture-report.md

      - name: Comment on requested issue
        if: github.event_name == 'workflow_dispatch' && inputs.comment_issue_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ inputs.comment_issue_number }}" --body-file capture-report.md
