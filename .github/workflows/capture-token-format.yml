name: Capture GitHub App token format

on:
  workflow_dispatch:
    inputs:
      override:
        description: Token format override to request
        required: true
        default: enabled
        type: choice
        options:
          - enabled
          - disabled
          - both
          - absent
      comment_issue_number:
        description: Optional issue number to comment on
        required: false
        type: string
      attempts:
        description: Requests to make per override
        required: true
        default: "12"
        type: string
      delay_seconds:
        description: Delay between attempts
        required: true
        default: "5"
        type: string
  schedule:
    - cron: "*/15 * * * *"
  issues:
    types:
      - opened

jobs:
  capture:
    runs-on: ubuntu-latest
    permissions: read-all
    outputs:
      jwt_like_token_found: ${{ steps.report_outputs.outputs.jwt_like_token_found }}
    env:
      GITHUB_APP_ID: ${{ secrets.GHAPPJWT_APP_ID }}
      GITHUB_INSTALLATION_ID: ${{ secrets.GHAPPJWT_INSTALLATION_ID }}
      GHAPPJWT_PRIVATE_KEY_PEM: ${{ secrets.GHAPPJWT_PRIVATE_KEY }}
      ACTIONS_GITHUB_TOKEN: ${{ github.token }}
      OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.override || 'both' }}
      ATTEMPTS: ${{ github.event_name == 'workflow_dispatch' && inputs.attempts || '1' }}
      DELAY_SECONDS: ${{ github.event_name == 'workflow_dispatch' && inputs.delay_seconds || '0' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Write private key
        shell: bash
        run: |
          key_path="${RUNNER_TEMP}/github-app.private-key.pem"
          printf '%s' "${GHAPPJWT_PRIVATE_KEY_PEM}" > "${key_path}"
          chmod 600 "${key_path}"
          echo "GITHUB_APP_PRIVATE_KEY=${key_path}" >> "${GITHUB_ENV}"

      - name: Capture token format
        run: |
          python ghappjwt.py \
            --override "${OVERRIDE}" \
            --attempts "${ATTEMPTS}" \
            --delay-seconds "${DELAY_SECONDS}" \
            --stop-on-jwt \
            --classify-token-env ACTIONS_GITHUB_TOKEN \
            --output capture-output.json

      - name: Render Markdown report
        run: |
          python scripts/render_issue_comment.py capture-output.json > capture-report.md
          cat capture-report.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Set report outputs
        id: report_outputs
        run: python scripts/write_report_outputs.py capture-output.json

      - name: Upload sanitized capture
        uses: actions/upload-artifact@v4
        with:
          name: ghappjwt-capture
          path: |
            capture-output.json
            capture-report.md
          retention-days: 14

  report:
    runs-on: ubuntu-latest
    needs: capture
    if: always()
    permissions:
      contents: read
      issues: write

    steps:
      - name: Download sanitized capture
        uses: actions/download-artifact@v4
        with:
          name: ghappjwt-capture

      - name: Add report to job summary
        if: hashFiles('capture-report.md') != ''
        run: cat capture-report.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment on opened issue
        if: github.event_name == 'issues' && hashFiles('capture-report.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --repo "${GITHUB_REPOSITORY}" --body-file capture-report.md

      - name: Comment on requested issue
        if: github.event_name == 'workflow_dispatch' && inputs.comment_issue_number != '' && hashFiles('capture-report.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ inputs.comment_issue_number }}" --repo "${GITHUB_REPOSITORY}" --body-file capture-report.md

      - name: Fail unless new token format was observed
        if: always()
        run: |
          if [ "${{ needs.capture.outputs.jwt_like_token_found }}" != "true" ]; then
            echo "No JWT-shaped token observed." >&2
            exit 1
          fi
          echo "JWT-shaped token observed."
